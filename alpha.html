<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>livere — Buzz Dashboard</title>
<style>
/* ─── 기초 스타일 (기존 테마 유지) ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0d11; --surface: #14151a; --elev: #1a1b22; --hover: #1f2029;
  --text: #ececf0; --text-dim: #9a9aac; --text-mute: #5d5d70;
  --border: #23242e; --border-strong: #2f303c;
  --brand: #4f7ce4; --brand-hi: #6b94f2; --brand-soft: rgba(79,124,228,0.12);
  --pos: #4ba882; --neg: #d56565; --neu: #8b8b9a;
  --radius: 12px; --transition: 160ms ease;
}
[data-theme="light"] {
  --bg: #f6f7f9; --surface: #ffffff; --elev: #ffffff; --hover: #eef0f4;
  --text: #17181f; --text-dim: #5a5d6b; --text-mute: #9698a5;
  --border: #e6e8ee; --border-strong: #d1d4dc;
}
body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; overflow-x: hidden; }
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
.tnum { font-variant-numeric: tabular-nums; }

/* ─── 레이아웃 ─── */
.topbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 100; gap: 20px; }
.brand { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
.brand-mark { width: 24px; height: 24px; background: var(--brand); border-radius: 6px; display: grid; place-items: center; color: #fff; font-size: 12px; }

.layout { display: flex; padding-top: 60px; }
.sidebar { width: 260px; height: calc(100vh - 60px); position: fixed; border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 10px; }
.main { flex: 1; margin-left: 260px; margin-right: 380px; padding: 30px; min-height: 100vh; }
.sidebar-r { width: 380px; position: fixed; right: 0; border-left: 1px solid var(--border); height: calc(100vh - 60px); overflow-y: auto; padding: 20px; }

/* ─── 사이드바 아이템 ─── */
.sb-section-title { font-size: 11px; font-weight: 600; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.1em; padding: 10px; }
.sb-item { width: 100%; display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; font-size: 14px; transition: var(--transition); text-align: left; margin-bottom: 2px; }
.sb-item:hover { background: var(--hover); }
.sb-item.active { background: var(--brand-soft); color: var(--brand-hi); font-weight: 600; }
.sb-icon { width: 24px; height: 24px; background: var(--elev); border-radius: 6px; display: grid; place-items: center; font-size: 11px; border: 1px solid var(--border); }
.sb-item.active .sb-icon { background: var(--brand); color: #fff; border-color: var(--brand); }

/* ─── 카드 (Stream) ─── */
.stream { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: var(--transition); display: flex; flex-direction: column; gap: 12px; }
.card:hover { transform: translateY(-2px); border-color: var(--border-strong); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
.card-title { font-size: 18px; font-weight: 700; color: var(--brand-hi); } /* 키워드 영역 */
.card-body { font-size: 15px; color: var(--text); font-weight: 500; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; } /* 제목 영역 */
.card-attrib { display: flex; align-items: center; gap: 10px; padding-top: 15px; border-top: 1px solid var(--border); margin-top: auto; }
.avatar-sm { width: 32px; height: 32px; border-radius: 50%; background: var(--elev); display: grid; place-items: center; font-size: 12px; font-weight: 700; border: 1px solid var(--border); }
.meta-info { flex: 1; font-size: 12px; color: var(--text-dim); }
.meta-name { font-weight: 600; color: var(--text); }
.card-action-btn { padding: 8px 12px; background: var(--brand-soft); color: var(--brand-hi); border-radius: 8px; font-size: 13px; font-weight: 600; transition: var(--transition); text-align: center; text-decoration: none; }
.card-action-btn:hover { background: var(--brand); color: #fff; }

/* ─── 통계 ─── */
.live-head { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
.stat-box h4 { font-size: 12px; color: var(--text-mute); margin-bottom: 5px; }
.stat-val { font-size: 24px; font-weight: 700; }
.stat-val span { font-size: 14px; font-weight: 500; margin-left: 4px; color: var(--text-mute); }

/* ─── 유틸 ─── */
.loading { grid-column: 1/-1; text-align: center; padding: 100px; color: var(--text-mute); font-size: 18px; }
</style>
</head>
<body>

<header class="topbar">
    <a href="#" class="brand"><div class="brand-mark">L</div>livere Buzz</a>
    <div style="flex:1"></div>
    <button id="theme-toggle" class="sb-icon" style="width:36px; height:36px">🌓</button>
</header>

<div class="layout">
    <aside class="sidebar" id="sb-left">
        <div class="sb-section">
            <div class="sb-section-title">키워드 필터 <span id="kw-count" class="tnum" style="margin-left:5px; color:var(--brand-hi)">0</span></div>
            <div id="keyword-list">
                </div>
        </div>
    </aside>

    <main class="main">
        <section class="live-head">
            <div class="stat-box">
                <h4>실시간 수집 현황</h4>
                <div class="stat-val tnum" id="val-collected">0<span>건</span></div>
            </div>
            <div style="text-align: right">
                <div style="color: var(--pos); font-size: 12px; font-weight: 700; margin-bottom: 4px;">● LIVE MONITORING</div>
                <div style="color: var(--text-mute); font-size: 12px;" id="last-update">업데이트 시각: -</div>
            </div>
        </section>

        <div class="stream" id="stream">
            <div class="loading">데이터를 불러오는 중입니다...</div>
        </div>
    </main>

    <aside class="sidebar-r">
        <div class="sb-section-title">최근 알림</div>
        <div style="padding:10px; color:var(--text-dim); font-size:13px; background:var(--elev); border-radius:12px; border:1px solid var(--border)">
            현재 실시간 데이터 수집이 원활합니다. 키워드 필터를 선택하여 탐색하세요.
        </div>
    </aside>
</div>

<script>
/**
 * 1. 설정 정보
 * GID_ARCA는 시트의 고유 ID(1711740114)를 그대로 사용해야 합니다.
 * '1'은 시트의 번호일 뿐, 내부 데이터 접근 ID가 아니기 때문입니다.
 */
const SHEET_ID = '1ppXzcbJqK7Yk2jgm2a-SmTyTKLsGU0AfLZJhd8ALJoM';
const GID_DC = '0';
const GID_ARCA = '1711740114'; 

let fullData = []; // 원본 보존

/**
 * 2. 데이터 수집 엔진
 */
async function fetchSheetData(gid) {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
    const response = await fetch(url);
    const csvText = await response.text();
    return parseCSV(csvText);
}

function parseCSV(csv) {
    const lines = csv.split('\n');
    const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
    return lines.slice(1).map(line => {
        const values = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
        const obj = {};
        headers.forEach((header, i) => {
            obj[header] = values[i] ? values[i].replace(/"/g, '').trim() : '';
        });
        return obj;
    });
}

/**
 * 3. 키워드 사이드바 구축
 */
function renderSidebar(data) {
    const kwContainer = document.getElementById('keyword-list');
    const keywords = [...new Set(data.map(item => item['키워드']).filter(k => k))];
    document.getElementById('kw-count').innerText = keywords.length;

    kwContainer.innerHTML = `
        <button class="sb-item active" data-kw="전체">
            <span class="sb-icon">ALL</span>
            <span class="sb-item-label">전체 보기</span>
        </button>
    `;

    keywords.forEach(kw => {
        const btn = document.createElement('button');
        btn.className = 'sb-item';
        btn.setAttribute('data-kw', kw);
        btn.innerHTML = `<span class="sb-icon">#</span><span class="sb-item-label">${kw}</span>`;
        kwContainer.appendChild(btn);
    });

    // 클릭 이벤트 바인딩
    kwContainer.querySelectorAll('.sb-item').forEach(btn => {
        btn.onclick = () => {
            kwContainer.querySelectorAll('.sb-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterByKeyword(btn.getAttribute('data-kw'));
        };
    });
}

/**
 * 4. 필터링 및 렌더링 (키워드 <-> 제목 변경 반영)
 */
function filterByKeyword(keyword) {
    const filtered = (keyword === '전체') 
        ? fullData 
        : fullData.filter(item => item['키워드'] === keyword);
    displayCards(filtered);
}

function displayCards(data) {
    const stream = document.getElementById('stream');
    stream.innerHTML = '';

    data.forEach(item => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-content">
                <div class="card-title">${item['키워드'] || '키워드 없음'}</div>
                <p class="card-body">${item['제목'] || '내용 없음'}</p>
            </div>
            <div class="card-attrib">
                <div class="avatar-sm" style="background: ${item.source === 'ARCA' ? '#4f7ce4' : '#ff4e4e'}; color: #fff">
                    ${item.source === 'ARCA' ? 'A' : 'D'}
                </div>
                <div class="meta-info">
                    <div class="meta-name">${item['작성자'] || '익명'}</div>
                    <div>${item['작성일'] || '-'} · ${item.source}</div>
                </div>
            </div>
            <a href="${item['링크']}" target="_blank" class="card-action-btn">원문 보기</a>
        `;
        stream.appendChild(card);
    });

    document.getElementById('val-collected').innerHTML = `${data.length.toLocaleString()}<span>건</span>`;
}

/**
 * 5. 초기화
 */
async function init() {
    try {
        const [dc, arca] = await Promise.all([fetchSheetData(GID_DC), fetchSheetData(GID_ARCA)]);
        
        fullData = [
            ...arca.map(d => ({...d, source: 'ARCA'})),
            ...dc.map(d => ({...d, source: 'DC'}))
        ].sort((a, b) => new Date(b['작성일']) - new Date(a['작성일']));

        renderSidebar(fullData);
        displayCards(fullData);
        document.getElementById('last-update').innerText = `업데이트 시각: ${new Date().toLocaleTimeString()}`;
    } catch (e) {
        console.error(e);
        document.getElementById('stream').innerHTML = '<div class="loading">데이터 로드에 실패했습니다. 공유 설정을 확인하세요.</div>';
    }
}

// 테마 토글 간단 구현
document.getElementById('theme-toggle').onclick = () => {
    const b = document.body;
    b.dataset.theme = b.dataset.theme === 'light' ? '' : 'light';
};

window.onload = init;
</script>

</body>
</html>
