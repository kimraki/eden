<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>livere — Buzz Dashboard</title>
<style>
/* ─── 기존 디자인 스타일 ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0d11; --surface: #14151a; --elev: #1a1b22; --hover: #1f2029;
  --text: #ececf0; --text-dim: #9a9aac; --text-mute: #5d5d70;
  --border: #23242e; --border-strong: #2f303c;
  --brand: #4f7ce4; --brand-hi: #6b94f2; --brand-soft: rgba(79,124,228,0.12);
  --pos: #4ba882; --neg: #d56565; --neu: #8b8b9a;
  --radius: 12px; --transition: 160ms ease;
}
body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; overflow: hidden; }
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
.tnum { font-variant-numeric: tabular-nums; }

/* 레이아웃 */
#login-screen { position: fixed; inset: 0; background: #0c0d11; display: flex; align-items:center; justify-content:center; z-index: 9999; }
.login-card { background: #14151a; padding: 40px; border-radius: 16px; border: 1px solid #23242e; width: 340px; text-align: center; }
.login-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #23242e; background: #0c0d11; color: #fff; outline: none; }
.login-btn { width: 100%; padding: 12px; background: var(--brand); color: #fff; border-radius: 8px; font-weight: bold; }

.topbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 100; gap: 20px; }
.brand { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
.brand-mark { width: 24px; height: 24px; background: var(--brand); border-radius: 6px; display: grid; place-items: center; color: #fff; font-size: 12px; }

.layout { display: flex; padding-top: 60px; }
.sidebar { width: 260px; height: calc(100vh - 60px); position: fixed; border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 10px; }
.main { flex: 1; margin-left: 260px; margin-right: 300px; padding: 30px; min-height: 100vh; overflow-y: auto; height: calc(100vh - 60px); scroll-behavior: smooth; }
.sidebar-r { width: 300px; position: fixed; right: 0; border-left: 1px solid var(--border); height: calc(100vh - 60px); overflow-y: auto; padding: 20px; }

/* 사이드바 */
.sb-section { margin-bottom: 24px; }
.sb-section-title { font-size: 11px; font-weight: 600; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.1em; padding: 10px; }
.sb-item { width: 100%; display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; font-size: 14px; transition: var(--transition); text-align: left; margin-bottom: 2px; color: var(--text-dim); }
.sb-item:hover { background: var(--hover); color: var(--text); }
.sb-item.active { background: var(--brand-soft); color: var(--brand-hi); font-weight: 600; }
.sb-icon { width: 24px; height: 24px; background: var(--elev); border-radius: 6px; display: grid; place-items: center; font-size: 10px; border: 1px solid var(--border); }

/* 카드 스트림 */
.stream { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 40px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: var(--transition); display: flex; flex-direction: column; gap: 14px; }
.card:hover { transform: translateY(-2px); border-color: var(--border-strong); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
.card-title { font-size: 17px; font-weight: 700; }
.card-body { font-size: 14px; color: var(--text); font-weight: 500; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; min-height: 4.2em; line-height: 1.4; }
.card-metrics { display: flex; gap: 14px; color: var(--text-mute); font-size: 12px; }
.metric-item { display: flex; align-items: center; gap: 4px; }
.metric-item svg { width: 14px; height: 14px; opacity: 0.7; }
.card-attrib { display: flex; align-items: center; gap: 10px; padding-top: 14px; border-top: 1px solid var(--border); }
.avatar-sm { width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; font-size: 12px; font-weight: 700; }
.meta-info { flex: 1; font-size: 11px; color: var(--text-dim); }
.card-footer { display: flex; gap: 8px; margin-top: 4px; }
.card-action-btn { flex: 1; padding: 10px; background: var(--brand-soft); color: var(--brand-hi); border-radius: 8px; font-size: 13px; font-weight: 600; text-align: center; text-decoration: none; }
.bookmark-btn { width: 42px; height: 40px; display: grid; place-items: center; background: var(--elev); border: 1px solid var(--border); border-radius: 8px; color: var(--text-mute); }
.bookmark-btn.active { color: #ffd700; border-color: #ffd700; }

/* ─── 페이지네이션 스타일 ─── */
.pagination-container { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 20px 0 50px; }
.pg-btn { min-width: 36px; height: 36px; padding: 0 8px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); font-size: 14px; font-weight: 600; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
.pg-btn:hover:not(:disabled) { background: var(--hover); color: var(--text); border-color: var(--border-strong); }
.pg-btn.active { background: var(--brand); color: white; border-color: var(--brand); }
.pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.live-head { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
.stat-val { font-size: 24px; font-weight: 700; }
.loading { grid-column: 1/-1; text-align: center; padding: 100px; color: var(--text-mute); font-size: 18px; }
</style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div style="width: 40px; height: 40px; background: var(--brand); border-radius: 8px; display: grid; place-items: center; color: #fff; font-size: 18px; font-weight:bold; margin: 0 auto 20px;">L</div>
        <h2 style="color:#fff; margin-bottom:24px; font-size:20px;">livere Buzz 접속</h2>
        <input type="text" id="user-id" class="login-input" placeholder="아이디">
        <input type="password" id="user-pw" class="login-input" placeholder="비밀번호">
        <button id="login-btn" class="login-btn">로그인</button>
        <p id="login-error" style="color:var(--neg); font-size:12px; margin-top:16px; display:none;">인증에 실패했습니다.</p>
    </div>
</div>

<div id="main-content" style="display:none;">
    <header class="topbar">
        <a href="#" class="brand"><div class="brand-mark">L</div>livere Buzz</a>
        <div style="flex:1"></div>
        <button id="theme-toggle" class="sb-icon" style="width:36px; height:36px">🌓</button>
    </header>
    <div class="layout">
        <aside class="sidebar" id="sb-left">
            <div class="sb-section">
                <div class="sb-section-title">라이브러리</div>
                <div id="library-list">
                    <button class="sb-item active" onclick="setViewMode('all', this)"><span class="sb-icon">ALL</span><span class="sb-item-label">전체 스트림</span></button>
                    <button class="sb-item" onclick="setViewMode('saved', this)"><span class="sb-icon">★</span><span class="sb-item-label">북마크</span></button>
                </div>
            </div>
            <div class="sb-section">
                <div class="sb-section-title">채널 필터</div>
                <div id="channel-list">
                    <button class="sb-item active" onclick="setChannel('all', this)"><span class="sb-icon">ALL</span><span class="sb-item-label">전체 채널</span></button>
                    <button class="sb-item" onclick="setChannel('ARCA', this)"><span class="sb-icon">AR</span><span class="sb-item-label">ARCA</span></button>
                    <button class="sb-item" onclick="setChannel('DC', this)"><span class="sb-icon">DC</span><span class="sb-item-label">DC 인사이드</span></button>
                    <button class="sb-item" onclick="setChannel('바베', this)"><span class="sb-icon">BB</span><span class="sb-item-label">바베챗갤</span></button>
                </div>
            </div>
            <div class="sb-section">
                <div class="sb-section-title">키워드 필터 <span id="kw-count" class="tnum" style="margin-left:5px; color:var(--brand-hi)">0</span></div>
                <div id="keyword-list"></div>
            </div>
        </aside>

        <main class="main" id="main-scroll">
            <section class="live-head">
                <div class="stat-box"><h4>통합 수집 현황</h4><div class="stat-val tnum" id="val-collected">0<span>건</span></div></div>
                <div style="text-align: right">
                    <div style="color: var(--pos); font-size: 12px; font-weight: 700; margin-bottom: 4px;">● LIVE MONITORING</div>
                    <div style="color: var(--text-mute); font-size: 11px;" id="last-update">...</div>
                </div>
            </section>
            
            <div class="stream" id="stream"></div>
            
            <div id="pagination" class="pagination-container"></div>
        </main>

        <aside class="sidebar-r"><div class="sb-section-title">최근 알림</div><div id="notif-box" style="padding:15px; color:var(--text-dim); font-size:13px; background:var(--elev); border-radius:12px; border:1px solid var(--border); line-height:1.7">연동 대기 중</div></aside>
    </div>
</div>

<script>
// 기본 설정
const ACCESS_ID = "eden", ACCESS_PW = "eden1234";
const SHEET_ID = '1ppXzcbJqK7Yk2jgm2a-SmTyTKLsGU0AfLZJhd8ALJoM';
const GID_DC = '0', GID_ARCA = '1711740114', GID_DC_BARBIE = '1630739076';

let fullData = [];      
let curKeyword = 'all', curChannel = 'all', viewMode = 'all';
let bookmarks = JSON.parse(localStorage.getItem('buzz_bookmarks')) || [];

// ─── 페이지네이션 관련 변수 ───
let currentPage = 1;
const itemsPerPage = 12; // 한 페이지에 12개씩 표시
let currentFilteredData = [];

function checkLogin() {
    if (document.getElementById('user-id').value === ACCESS_ID && document.getElementById('user-pw').value === ACCESS_PW) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.body.style.overflow = 'auto';
        init();
    } else { document.getElementById('login-error').style.display = 'block'; }
}
document.getElementById('login-btn').onclick = checkLogin;

function toggleBookmark(url, btn) {
    const idx = bookmarks.indexOf(url);
    if (idx > -1) { bookmarks.splice(idx, 1); btn.classList.remove('active'); }
    else { bookmarks.push(url); btn.classList.add('active'); }
    localStorage.setItem('buzz_bookmarks', JSON.stringify(bookmarks));
    if (viewMode === 'saved') applyFilters();
}

function setViewMode(m, b) { viewMode = m; updateActive('#library-list', b); applyFilters(); }
function setChannel(c, b) { curChannel = c; updateActive('#channel-list', b); applyFilters(); }
function setKeyword(k, b) { curKeyword = k; updateActive('#keyword-list', b); applyFilters(); }
function updateActive(selector, btn) { document.querySelectorAll(`${selector} .sb-item`).forEach(el => el.classList.remove('active')); btn.classList.add('active'); }

// ─── 필터 적용 및 페이지 초기화 ───
function applyFilters() {
    currentFilteredData = fullData.filter(item => {
        const mk = (curKeyword === 'all' || item['키워드'] === curKeyword);
        const mc = (curChannel === 'all' || item.source === curChannel);
        const ms = (viewMode === 'all' || bookmarks.includes(item['URL']));
        return mk && mc && ms;
    });
    
    currentPage = 1; // 필터 변경 시 1페이지로 리셋
    renderPagination();
    displayCurrentPage();
}

// ─── 현재 페이지 카드만 표시 ───
function displayCurrentPage() {
    const stream = document.getElementById('stream');
    stream.innerHTML = '';
    
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageData = currentFilteredData.slice(start, end);

    if (pageData.length === 0) {
        stream.innerHTML = `<div class="loading">표시할 데이터가 없습니다.</div>`;
    } else {
        renderCards(pageData);
    }
    
    // 페이지 이동 시 상단으로 스크롤
    document.getElementById('main-scroll').scrollTop = 0;
    
    document.getElementById('val-collected').innerHTML = `${currentFilteredData.length.toLocaleString()}<span>건</span>`;
}

// ─── 페이지네이션 UI 렌더링 ───
function renderPagination() {
    const container = document.getElementById('pagination');
    container.innerHTML = '';
    
    const totalPages = Math.ceil(currentFilteredData.length / itemsPerPage);
    if (totalPages <= 1) return; // 1페이지 이하면 숨김

    // 이전 버튼
    const prevBtn = document.createElement('button');
    prevBtn.className = 'pg-btn';
    prevBtn.innerText = '이전';
    prevBtn.disabled = currentPage === 1;
    prevBtn.onclick = () => { currentPage--; updateUI(); };
    container.appendChild(prevBtn);

    // 페이지 번호 (최대 5개 정도 표시되도록 로직 구성 가능하지만 여기선 단순화)
    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
            const pg = document.createElement('button');
            pg.className = `pg-btn ${i === currentPage ? 'active' : ''}`;
            pg.innerText = i;
            pg.onclick = () => { currentPage = i; updateUI(); };
            container.appendChild(pg);
        } else if (i === currentPage - 3 || i === currentPage + 3) {
            const dots = document.createElement('span');
            dots.innerText = '...';
            dots.style.color = 'var(--text-mute)';
            container.appendChild(dots);
        }
    }

    // 다음 버튼
    const nextBtn = document.createElement('button');
    nextBtn.className = 'pg-btn';
    nextBtn.innerText = '다음';
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.onclick = () => { currentPage++; updateUI(); };
    container.appendChild(nextBtn);

    function updateUI() {
        renderPagination();
        displayCurrentPage();
    }
}

function renderCards(pageData) {
    const s = document.getElementById('stream');
    pageData.forEach(x => {
        let col = '#4f7ce4', lab = 'ARCA';
        if (x.source === 'DC') { col = '#ff4e4e'; lab = 'DC'; }
        if (x.source === '바베') { col = '#ff8c00'; lab = '바베'; }
        
        const isSaved = bookmarks.includes(x['URL']);
        const art = document.createElement('article');
        art.className = 'card';
        art.innerHTML = `
            <div class="card-content">
                <div class="card-title" style="color:${col}">${x['키워드']||''}</div>
                <p class="card-body">${x['제목']||''}</p>
                <div class="card-metrics tnum">
                    <div class="metric-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${x['조회']||0}</div>
                    <div class="metric-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>${x['추천']||0}</div>
                    <div class="metric-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${x['댓글']||0}</div>
                </div>
            </div>
            <div class="card-attrib">
                <div class="avatar-sm" style="background:${col};color:#fff">${lab[0]}</div>
                <div class="meta-info"><div><b>${x['작성자']||'익명'}</b></div><div>${x['작성일']||''} · ${lab}</div></div>
            </div>
            <div class="card-footer">
                <a href="${x['URL']||'#'}" target="_blank" class="card-action-btn">원문 보기</a>
                <button class="bookmark-btn ${isSaved ? 'active' : ''}" onclick="toggleBookmark('${x['URL']}', this)">
                    <svg viewBox="0 0 24 24" fill="${isSaved?'#ffd700':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                </button>
            </div>`;
        s.appendChild(art);
    });
}

async function fetchSheet(gid) {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
    const r = await fetch(url);
    const txt = await r.text();
    const rows = txt.split('\n');
    const head = rows[0].split(',').map(h => h.replace(/"/g, '').trim());
    return rows.slice(1).map(row => {
        const val = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
        const obj = {};
        head.forEach((h, i) => { obj[h] = val[i] ? val[i].replace(/"/g, '').trim() : ''; });
        return obj;
    });
}

async function init() {
    try {
        const [dc, arca, barbie] = await Promise.all([fetchSheet(GID_DC), fetchSheet(GID_ARCA), fetchSheet(GID_DC_BARBIE)]);
        fullData = [...arca.map(x=>({...x,source:'ARCA'})), ...dc.map(x=>({...x,source:'DC'})), ...barbie.map(x=>({...x,source:'바베'}))].sort((a,b)=>new Date(b['작성일'])-new Date(a['작성일']));
        
        const kwList = document.getElementById('keyword-list');
        const kws = [...new Set(fullData.map(x => x['키워드']).filter(k => k))];
        document.getElementById('kw-count').innerText = kws.length;
        kwList.innerHTML = `<button class="sb-item active" onclick="setKeyword('all', this)"><span class="sb-icon">ALL</span><span class="sb-item-label">전체 보기</span></button>`;
        kws.forEach(k => {
            const b = document.createElement('button');
            b.className = 'sb-item';
            b.onclick = () => setKeyword(k, b);
            b.innerHTML = `<span class="sb-icon">#</span><span class="sb-item-label">${k}</span>`;
            kwList.appendChild(b);
        });
        applyFilters();
        document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
    } catch(e) { console.error(e); }
}

document.getElementById('theme-toggle').onclick = () => {
    document.body.dataset.theme = document.body.dataset.theme === 'light' ? '' : 'light';
};
</script>
</body>
</html>
